[project]
name = "event-schnorr"
authors = ["Alice Johnson <alice@example.com>"]
description = "Schnorr signature verification for event-based authentication"
telemetry = false
requirements = []
[contracts.schnorr-event-validator]
path = "contracts/schnorr-event-validator.clar"
depends_on = []

[contracts.schnorr-signature-verifier]
path = "contracts/schnorr-signature-verifier.clar"
depends_on = []

[contracts.event-authentication]
path = "contracts/event-authentication.clar"
depends_on = []

[contracts.event-access-control]
path = "contracts/event-access-control.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
